<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>البستنة والحدائق - BELG SERVICES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fefcf5; color: #1e2a2f; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: white; border-bottom: 1px solid #f0e4d8; flex-wrap: wrap; gap: 20px; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 45px; width: auto; }
        .logo-text { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #c49a6c, #8b5a2b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; font-weight: 500; color: #2c3e2f; transition: 0.2s; }
        .nav-links a:hover { color: #c49a6c; }
        
        /* Hero Section */
        .hero-text { text-align: center; padding: 40px 20px; background: #fefcf5; }
        .hero-text h1 { font-size: 2rem; color: #c49a6c; margin-bottom: 10px; }
        .hero-text p { color: #6e5e4a; }
        
        /* Buttons Section */
        .buttons-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .button-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .skill-btn { background: white; border: 2px solid #c49a6c; color: #c49a6c; padding: 12px 24px; border-radius: 60px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .skill-btn:hover { background: #c49a6c; color: white; transform: translateY(-2px); }
        .add-btn { background: #c49a6c; color: white; border: none; padding: 16px 32px; border-radius: 60px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin: 20px auto; display: block; width: fit-content; transition: 0.2s; }
        .add-btn:hover { background: #a57c52; transform: scale(1.02); }
        
        /* FULL WIDTH VIDEO SECTION - No gaps, edge to edge */
        .video-section { width: 100%; margin: 0; padding: 0; background: #000; position: relative; overflow: hidden; }
        .video-section video { width: 100%; height: auto; display: block; object-fit: cover; }
        
        /* Footer */
        .footer { background: #2c3e2f; color: white; text-align: center; padding: 30px; margin-top: 0; width: 100%; }
        
        @media (max-width: 768px) {
            .navbar { padding: 16px 20px; flex-direction: column; }
            .nav-links { justify-content: center; }
            .skill-btn { padding: 8px 16px; font-size: 0.8rem; }
            .hero-text h1 { font-size: 1.5rem; }
            .video-section video { height: auto; min-height: 200px; object-fit: cover; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="navbar">
        <div class="logo-area"><img src="logo.png" alt="BELG SERVICES" class="logo-img"><span class="logo-text">BELG SERVICES</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li><li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li><li><a href="settings.html" style="font-size: 1.2rem;"><i class="fas fa-cog"></i></a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>
    
    <!-- Hero Text -->
    <div class="hero-text">
        <h1>🌿 مهاراتك تكسبك الثقة والعمل المستمر</h1>
        <p>سجل خبرتك في البستنة والحدائق</p>
    </div>
    
    <!-- Buttons -->
    <div class="buttons-container">
        <div class="button-row">
            <button class="skill-btn" onclick="alert('سائق جرار')">🚜 سائق جرار</button>
            <button class="skill-btn" onclick="alert('تربية مواشي')">🐄 تربية مواشي</button>
            <button class="skill-btn" onclick="alert('الزراعة')">🌾 الزراعة</button>
            <button class="skill-btn" onclick="alert('زراعة البيوت')">🏠 زراعة البيوت</button>
            <button class="skill-btn" onclick="alert('قص الحدائق')">✂️ قص الحدائق</button>
        </div>
        
        <button class="add-btn" onclick="alert('➕ إضافة مهارة زراعية جديدة')">➕ أضف مهنتك</button>
        
        <div class="button-row">
            <button class="skill-btn" onclick="alert('قص الأشجار')">🌳 قص الأشجار</button>
            <button class="skill-btn" onclick="alert('بناء سياج مزرعة')">🚧 بناء سياج</button>
            <button class="skill-btn" onclick="alert('زراعة الأشجار')">🌲 زراعة الأشجار</button>
            <button class="skill-btn" onclick="alert('تنسيق الحدائق')">🏞️ تنسيق الحدائق</button>
            <button class="skill-btn" onclick="alert('تصميم مخططات')">📐 تصميم مخططات</button>
        </div>
    </div>
    
    <!-- VIDEO SECTION - Edge to Edge, fills all empty space -->
    <div class="video-section">
        <video autoplay loop muted playsinline>
            <source src="gardening-video.mp4" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
    </div>
    
    <!-- Footer -->
    <div class="footer">
        <p>© 2025 BELG SERVICES — Gardening & Landscaping</p>
    </div>
</body>
</html>
