<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — BELG SERVICES</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  color: #222;
}

/* NAV */
.top-nav {
  background: #003366;
  padding: 12px 0;
  text-align: center;
}

.top-nav a {
  color: white;
  margin: 0 12px;
  text-decoration: none;
  font-weight: bold;
  font-size: 15px;
}

/* WRAPPER */
.wrapper {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 15px 40px;
}

/* TITLE */
.page-title {
  font-size: 22px;
  font-weight: bold;
  color: #003366;
  margin: 20px 0 15px;
  text-align: left;
}

/* CARD */
.card {
  background: white;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 18px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.card h3 {
  margin: 0 0 12px;
  font-size: 17px;
  color: #003366;
}

/* INPUTS */
.card label {
  font-size: 14px;
  font-weight: bold;
  color: #003366;
}

.card input,
.card select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* SWITCH */
.switch {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
}

.switch span {
  font-size: 14px;
  font-weight: bold;
  color: #003366;
}

.switch input {
  width: 40px;
  height: 20px;
}

/* BUTTONS */
.save-btn {
  display: inline-block;
  padding: 12px 26px;
  background: #003366;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
  margin-top: 10px;
}

.save-btn:hover {
  background: #002244;
}

.logout-btn {
  display: inline-block;
  padding: 10px 20px;
  background: #777;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-size: 14px;
  margin-top: 10px;
}

.logout-btn:hover {
  background: #555;
}

.delete-btn {
  display: inline-block;
  padding: 10px 20px;
  background: #cc0000;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-size: 14px;
  margin-top: 10px;
}

.delete-btn:hover {
  background: #990000;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="top-nav">
  <a href="index.html">Home</a>
  <a href="client.html">Find Worker</a>
  <a href="company-profile.html">Companies</a>
  <a href="worker-profile.html">Workers</a>
  <a href="payment.html">Payment</a>
  <a href="my-bookings.html">My Bookings</a>
  <a href="notifications.html">Notifications</a>
</nav>

<div class="wrapper">

  <div class="page-title">Settings</div>

  <!-- PERSONAL INFO -->
  <div class="card">
    <h3>Personal Information</h3>

    <label>Full Name</label>
    <input type="text" placeholder="Your name">

    <label>Email</label>
    <input type="email" placeholder="example@mail.com">

    <label>Phone Number</label>
    <input type="text" placeholder="+32 000 000">

    <label>Address</label>
    <input type="text" placeholder="Your address">
  </div>

  <!-- LANGUAGE -->
  <div class="card">
    <h3>Language</h3>
    <select>
      <option>English</option>
      <option>Arabic</option>
      <option>French</option>
      <option>Dutch</option>
    </select>
  </div>

  <!-- THEME -->
  <div class="card">
    <h3>Theme</h3>
    <select>
      <option>Light</option>
      <option>Dark</option>
    </select>
  </div>

  <!-- NOTIFICATIONS -->
  <div class="card">
    <h3>Notifications</h3>

    <div class="switch">
      <span>App Notifications</span>
      <input type="checkbox" checked>
    </div>

    <div class="switch">
      <span>Email Alerts</span>
      <input type="checkbox">
    </div>

  </div>

  <!-- SECURITY -->
  <div class="card">
    <h3>Security</h3>

    <label>New Password</label>
    <input type="password" placeholder="Enter new password">

    <a class="logout-btn" href="login.html">Log Out</a>
  </div>

  <!-- DELETE ACCOUNT -->
  <div class="card">
    <h3>Delete Account</h3>
    <p style="font-size:13px; color:#555;">This action cannot be undone.</p>
    <a class="delete-btn" href="#">Delete Account</a>
  </div>

</div>

</body>
</html>
