<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard - BELG SERVICES</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fefcf5;
            color: #1e2a2f;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: white;
            border-bottom: 1px solid #f0e4d8;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-img {
            height: 45px;
            width: auto;
            object-fit: contain;
        }
        .logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c49a6c, #8b5a2b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: #2c3e2f;
            transition: 0.2s;
        }
        .nav-links a:hover { color: #c49a6c; }

        .dashboard-container {
            max-width: 1280px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .welcome-section {
            background: linear-gradient(135deg, #c49a6c, #a57c52);
            border-radius: 32px;
            padding: 32px;
            color: white;
            margin-bottom: 32px;
        }
        .welcome-section h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            border: 1px solid #f0e4d8;
        }
        .stat-icon {
            font-size: 2.5rem;
            color: #c49a6c;
            margin-bottom: 16px;
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e2a2f;
        }
        .stat-label {
            color: #8b7a67;
            margin-top: 8px;
        }

        .footer {
            background: #2c3e2f;
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            .navbar { padding: 16px 20px; flex-direction: column; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-area">
            <img src="logo.png" alt="BELG SERVICES" class="logo-img" onerror="this.src='https://placehold.co/50x50?text=BS'">
            <span class="logo-text">BELG SERVICES</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="settings.html" style="font-size: 1.2rem;"><i class="fas fa-cog"></i></a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>

    <div class="dashboard-container">
        <div class="welcome-section">
            <h1>Welcome back, Admin 👋</h1>
            <p>Here's what's happening with your platform today.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-number">2,450</div>
                <div class="stat-label">Total Clients</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-hard-hat"></i></div>
                <div class="stat-number">860</div>
                <div class="stat-label">Verified Workers</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-building"></i></div>
                <div class="stat-number">320</div>
                <div class="stat-label">Partner Companies</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-number">1,250</div>
                <div class="stat-label">Bookings Completed</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2025 BELG SERVICES — Dashboard Overview</p>
    </div>

</body>
</html>
