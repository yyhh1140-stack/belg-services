<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — BELG SERVICES</title>

    <style>

    /* ----------------------  FOOTER  ---------------------- */
    .footer {
      background: #003366;
      color: white;
      padding: 20px 10px;
      text-align: center;
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.9;
    }

    /* ----------------------  GENERAL  ---------------------- */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      background: #ffffff;
    }

    .logo {
      width: 200px;
      margin-top: 40px;
    }

    h1 {
      font-size: 32px;
      margin-top: 10px;
      font-weight: bold;
      color: #003366;
    }

    /* ----------------------  NAVIGATION  ---------------------- */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #003366;
      padding: 12px 0;
      text-align: center;
      z-index: 999;
    }

    .top-nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
    }

    .top-nav a:hover {
      text-decoration: underline;
    }

    header {
      margin-top: 100px;
    }

    /* ----------------------  FORM BOX  ---------------------- */
    .reset-box {
      max-width: 450px;
      margin: 40px auto;
      padding: 25px;
      background: rgba(0,0,0,0.05);
      border-radius: 12px;
      text-align: left;
    }

    .reset-box label {
      font-size: 16px;
      font-weight: bold;
      color: #003366;
    }

    .reset-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0 20px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .btn-reset {
      width: 100%;
      background: #f4c542;
      color: black;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-reset:hover {
      background: #e0b235;
    }

    .extra-links {
      text-align: center;
      margin-top: 15px;
    }

    .extra-links a {
      color: #003366;
      text-decoration: none;
      font-weight: bold;
    }

    </style>
</head>

<body>

<!-- ----------------------  NAVIGATION  ---------------------- -->
<nav class="top-nav">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="services.html">Services</a>
  <a href="contact.html">Contact</a>
  <a href="login.html">Login</a>
  <a href="register.html">Register</a>
</nav>

<!-- ----------------------  HEADER  ---------------------- -->
<header>
    <img src="logo.png" alt="BELG SERVICES Logo" class="logo">
    <h1>Forgot Password</h1>
</header>

<!-- ----------------------  RESET FORM  ---------------------- -->
<div class="reset-box">

    <p style="font-size:17px; color:#444;">
        Enter your email address below and we will send you a link to reset your password.
    </p>

    <label>Email</label>
    <input type="email" placeholder="Enter your email" required>

    <button class="btn-reset">Send Reset Link</button>

    <div class="extra-links">
        <p><a href="login.html">Back to Login</a></p>
    </div>

</div>

<!-- ----------------------  FOOTER  ---------------------- -->
<footer class="footer">
  <p>© 2024 BELG SERVICES — All Rights Reserved</p>
  <p>Contact: info@belg-services.com</p>
</footer>

</body>
</html>
