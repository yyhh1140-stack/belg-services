<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Find a Company - BELG SERVICES</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fefcf5;
            color: #1e2a2f;
        }

        /* Header Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: white;
            border-bottom: 1px solid #f0e4d8;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-img {
            height: 45px;
            width: auto;
            object-fit: contain;
        }
        .logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c49a6c, #8b5a2b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: #2c3e2f;
            transition: 0.2s;
        }
        .nav-links a:hover { color: #c49a6c; }

        /* Search Section */
        .search-section {
            max-width: 1280px;
            margin: 40px auto;
            padding: 0 24px;
        }
        .search-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .search-header h1 {
            font-size: 2.2rem;
            color: #1e2a2f;
            margin-bottom: 12px;
        }
        .search-header p {
            color: #6e5e4a;
        }

        /* Filters */
        .filters-card {
            background: white;
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            border: 1px solid #f0e4d8;
            margin-bottom: 32px;
        }
        .filter-group {
            margin-bottom: 24px;
        }
        .filter-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #1e2a2f;
        }
        .filter-group input, .filter-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2cfbc;
            border-radius: 60px;
            font-size: 0.9rem;
            outline: none;
            background: white;
        }
        .filter-group input:focus, .filter-group select:focus {
            border-color: #c49a6c;
        }
        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .search-btn {
            background: #c49a6c;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: 0.2s;
        }
        .search-btn:hover {
            background: #a57c52;
        }

        /* Results */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin: 32px 0 20px;
        }
        .results-header h2 {
            font-size: 1.5rem;
        }
        .company-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .company-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            border: 1px solid #f0e4d8;
            transition: 0.2s;
        }
        .company-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(196,154,108,0.1);
        }
        .company-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .company-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
        }
        .company-info h3 {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }
        .company-category {
            color: #c49a6c;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .rating {
            color: #f5b042;
            margin: 8px 0;
        }
        .company-details {
            font-size: 0.85rem;
            color: #6e5e4a;
            margin: 12px 0;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .btn-view {
            flex: 1;
            background: transparent;
            border: 2px solid #c49a6c;
            color: #c49a6c;
            padding: 8px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
        }
        .btn-view:hover {
            background: #c49a6c;
            color: white;
        }
        .btn-chat {
            flex: 1;
            background: #c49a6c;
            border: none;
            color: white;
            padding: 8px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
        }
        .btn-chat:hover {
            background: #a57c52;
        }

        /* Footer */
        .footer {
            background: #2c3e2f;
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            .navbar { padding: 16px 20px; flex-direction: column; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
            .row-2col { grid-template-columns: 1fr; }
            .search-section { padding: 0 16px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="navbar">
        <div class="logo-area">
            <img src="logo.png" alt="BELG SERVICES" class="logo-img" onerror="this.src='https://placehold.co/50x50?text=BS'">
            <span class="logo-text">BELG SERVICES</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>

    <!-- Search Section -->
    <div class="search-section">
        <div class="search-header">
            <h1>Find a Company</h1>
            <p>Search for trusted companies across Belgium</p>
        </div>

        <!-- Filters -->
        <div class="filters-card">
            <div class="row-2col">
                <div class="filter-group">
                    <label>Service Type</label>
                    <select id="serviceType">
                        <option value="all">All Services</option>
                        <option value="cleaning">Cleaning</option>
                        <option value="moving">Moving</option>
                        <option value="construction">Construction</option>
                        <option value="industrial">Industrial</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Location</label>
                    <select id="location">
                        <option value="all">All Belgium</option>
                        <option value="brussels">Brussels</option>
                        <option value="antwerp">Antwerp</option>
                        <option value="ghent">Ghent</option>
                        <option value="liege">Liège</option>
                    </select>
                </div>
            </div>
            <div class="row-2col">
                <div class="filter-group">
                    <label>Minimum Rating</label>
                    <select id="rating">
                        <option value="0">Any Rating</option>
                        <option value="4">4+ Stars</option>
                        <option value="4.5">4.5+ Stars</option>
                        <option value="4.8">4.8+ Stars</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Price Range</label>
                    <select id="price">
                        <option value="all">All Prices</option>
                        <option value="low">Under $500</option>
                        <option value="medium">$500 - $2,000</option>
                        <option value="high">Above $2,000</option>
                    </select>
                </div>
            </div>
            <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> Search Companies</button>
        </div>

        <!-- Results -->
        <div class="results-header">
            <h2>Results <span id="resultCount"></span></h2>
            <span style="color: #8b7a67;">Showing trusted companies</span>
        </div>
        <div class="company-grid" id="resultsContainer"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2025 BELG SERVICES — Find the best companies for your needs</p>
    </div>

    <script>
        const companies = [
            { id: 1, name: "EcoSolutions", category: "cleaning", rating: 4.9, location: "brussels", priceRange: "medium", projects: 250, years: 12, logo: "https://picsum.photos/id/20/100/100", description: "Eco-friendly cleaning services for homes and offices." },
            { id: 2, name: "FastMove Logistics", category: "moving", rating: 4.8, location: "antwerp", priceRange: "medium", projects: 180, years: 8, logo: "https://picsum.photos/id/58/100/100", description: "Fast and reliable moving services across Belgium." },
            { id: 3, name: "BuildMaster", category: "construction", rating: 4.7, location: "ghent", priceRange: "high", projects: 320, years: 15, logo: "https://picsum.photos/id/55/100/100", description: "Complete construction and renovation solutions." },
            { id: 4, name: "SteelPro Industries", category: "industrial", rating: 4.9, location: "liege", priceRange: "high", projects: 450, years: 20, logo: "https://picsum.photos/id/96/100/100", description: "Industrial equipment and metal fabrication." },
            { id: 5, name: "CleanHome", category: "cleaning", rating: 4.6, location: "brussels", priceRange: "low", projects: 95, years: 5, logo: "https://picsum.photos/id/26/100/100", description: "Affordable home and office cleaning." },
            { id: 6, name: "HeavyLift", category: "moving", rating: 4.8, location: "liege", priceRange: "medium", projects: 210, years: 10, logo: "https://picsum.photos/id/10/100/100", description: "Specialized in heavy furniture and equipment moving." }
        ];

        function getRatingStars(rating) {
            let full = Math.floor(rating);
            let half = rating % 1 >= 0.5;
            let stars = "";
            for (let i = 0; i < full; i++) stars += "★";
            if (half) stars += "½";
            let empty = 5 - Math.ceil(rating);
            for (let i = 0; i < empty; i++) stars += "☆";
            return stars;
        }

        function filterCompanies() {
            const serviceType = document.getElementById("serviceType").value;
            const location = document.getElementById("location").value;
            const minRating = parseFloat(document.getElementById("rating").value);
            const priceRange = document.getElementById("price").value;

            let filtered = companies.filter(c => {
                if (serviceType !== "all" && c.category !== serviceType) return false;
                if (location !== "all" && c.location !== location) return false;
                if (minRating > 0 && c.rating < minRating) return false;
                if (priceRange !== "all" && c.priceRange !== priceRange) return false;
                return true;
            });

            document.getElementById("resultCount").innerText = `(${filtered.length} companies)`;
            const container = document.getElementById("resultsContainer");
            if (filtered.length === 0) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;">No companies match your criteria. Try adjusting filters.</div>`;
                return;
            }
            container.innerHTML = filtered.map(c => `
                <div class="company-card">
                    <div class="company-header">
                        <div class="company-logo" style="background-image: url('${c.logo}'); background-size: cover;"></div>
                        <div class="company-info">
                            <h3>${c.name}</h3>
                            <div class="company-category">${c.category.charAt(0).toUpperCase() + c.category.slice(1)}</div>
                        </div>
                    </div>
                    <div class="rating">${getRatingStars(c.rating)} ${c.rating}</div>
                    <div class="company-details">
                        <i class="fas fa-map-marker-alt"></i> ${c.location.charAt(0).toUpperCase() + c.location.slice(1)}<br>
                        <i class="fas fa-project-diagram"></i> ${c.projects}+ projects completed<br>
                        <i class="fas fa-calendar-alt"></i> ${c.years}+ years in business
                    </div>
                    <div class="action-buttons">
                        <button class="btn-view" onclick="alert('View details for ${c.name}')">View Profile</button>
                        <a href="chat.html" class="btn-chat"><i class="fas fa-comment"></i> Chat</a>
                    </div>
                </div>
            `).join("");
        }

        document.getElementById("searchBtn").addEventListener("click", filterCompanies);
        // Load initial results
        filterCompanies();
    </script>
</body>
</html>
