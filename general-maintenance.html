<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الصيانة العامة - BELG SERVICES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fefcf5; color: #1e2a2f; min-height: 100vh; display: flex; flex-direction: column; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: white; border-bottom: 1px solid #f0e4d8; flex-wrap: wrap; gap: 20px; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 45px; width: auto; }
        .logo-text { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #c49a6c, #8b5a2b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; font-weight: 500; color: #2c3e2f; transition: 0.2s; }
        .nav-links a:hover { color: #c49a6c; }
        
        .hero-text { text-align: center; padding: 40px 20px; background: #fefcf5; }
        .hero-text h1 { font-size: 2rem; color: #c49a6c; margin-bottom: 10px; }
        
        .buttons-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .button-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .skill-btn { background: white; border: 2px solid #c49a6c; color: #c49a6c; padding: 12px 24px; border-radius: 60px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .skill-btn:hover { background: #c49a6c; color: white; transform: translateY(-2px); }
        .add-btn { background: #c49a6c; color: white; border: none; padding: 16px 32px; border-radius: 60px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin: 20px auto; display: block; width: fit-content; }
        
        .video-section { width: 100%; margin: 0; padding: 0; background: #000; }
        .video-section video { width: 100%; height: auto; display: block; object-fit: cover; }
        
        .footer { background: #2c3e2f; color: white; text-align: center; padding: 30px; margin-top: 0; width: 100%; }
        
        @media (max-width: 768px) {
            .navbar { padding: 16px 20px; flex-direction: column; }
            .skill-btn { padding: 8px 16px; font-size: 0.8rem; }
            .hero-text h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo-area"><img src="logo.png" alt="BELG SERVICES" class="logo-img"><span class="logo-text">BELG SERVICES</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li><li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li><li><a href="settings.html" style="font-size: 1.2rem;"><i class="fas fa-cog"></i></a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>
    
    <div class="hero-text">
        <h1>🔧 مهاراتك تكسبك الثقة والعمل المستمر</h1>
        <p>سجل مهارتك في الصيانة العامة</p>
    </div>
    
    <div class="buttons-container">
        <div class="button-row">
            <button class="skill-btn" onclick="alert('بناء')">🏗️ بناء</button>
            <button class="skill-btn" onclick="alert('بلاط')">🪙 بلاط</button>
            <button class="skill-btn" onclick="alert('صباغ')">🎨 صباغ</button>
            <button class="skill-btn" onclick="alert('كهربائي')">⚡ كهربائي</button>
            <button class="skill-btn" onclick="alert('صحيات')">🚰 صحيات</button>
        </div>
        <button class="add-btn" onclick="alert('➕ إضافة مهنة جديدة')">➕ أضف مهنتك</button>
        <div class="button-row">
            <button class="skill-btn" onclick="alert('ميكانيكي')">🔧 ميكانيكي</button>
            <button class="skill-btn" onclick="alert('حداد')">⚙️ حداد</button>
            <button class="skill-btn" onclick="alert('اصلاحات سريعة')">🛠️ اصلاحات سريعة</button>
            <button class="skill-btn" onclick="alert('جزار')">🥩 جزار</button>
            <button class="skill-btn" onclick="alert('صيانة هواتف')">📱 صيانة هواتف</button>
        </div>
        <div class="button-row">
            <button class="skill-btn" onclick="alert('اصلاح الاثاث')">🪑 اصلاح الاثاث</button>
            <button class="skill-btn" onclick="alert('نجار')">🪚 نجار</button>
            <button class="skill-btn" onclick="alert('دراجات هوائية')">🚲 دراجات هوائية</button>
            <button class="skill-btn" onclick="alert('اصلاح دراجات كهربائية')">⚡ دراجات كهربائية</button>
        </div>
    </div>
    
    <div class="video-section">
        <video autoplay loop muted playsinline>
            <source src="maintenance-video.mp4" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
    </div>
    
    <div class="footer">
        <p>© 2025 BELG SERVICES — General Maintenance</p>
    </div>
</body>
</html>
