<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Secure Payment - BELG SERVICES</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fefcf5;
            color: #1e2a2f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Navigation - Matching index */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: white;
            border-bottom: 1px solid #f0e4d8;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-img {
            height: 45px;
            width: auto;
            object-fit: contain;
        }
        .logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c49a6c, #8b5a2b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: #2c3e2f;
            transition: 0.2s;
        }
        .nav-links a:hover { color: #c49a6c; }

        /* Payment Container */
        .payment-container {
            flex: 1;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        /* Payment Form Card */
        .payment-card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            border: 1px solid #f0e4d8;
        }
        .payment-card h2 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: #1e2a2f;
        }
        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #d4f5d0;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #2e6b1f;
            margin-bottom: 24px;
        }
        .card-icons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: flex-end;
        }
        .card-icons i {
            font-size: 2rem;
            color: #6e5e4a;
            transition: 0.2s;
        }
        .card-icons i:hover {
            color: #c49a6c;
        }

        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #1e2a2f;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #e2cfbc;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: 0.2s;
            background: white;
        }
        .input-group input:focus {
            outline: none;
            border-color: #c49a6c;
            box-shadow: 0 0 0 3px rgba(196,154,108,0.1);
        }
        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .pay-btn {
            width: 100%;
            background: #c49a6c;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 16px;
        }
        .pay-btn:hover {
            background: #a57c52;
            transform: translateY(-2px);
        }

        /* Order Summary */
        .summary-card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            border: 1px solid #f0e4d8;
            height: fit-content;
        }
        .summary-card h3 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #1e2a2f;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0e4d8;
        }
        .summary-total {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            font-weight: 800;
            font-size: 1.2rem;
            color: #c49a6c;
        }
        .payment-methods {
            margin-top: 24px;
            padding-top: 16px;
            text-align: center;
        }
        .payment-methods p {
            font-size: 0.75rem;
            color: #8b7a67;
        }

        /* Footer */
        .footer {
            background: #2c3e2f;
            color: white;
            text-align: center;
            padding: 24px;
            margin-top: 40px;
        }
        .footer p {
            opacity: 0.8;
            font-size: 0.8rem;
        }

        @media (max-width: 800px) {
            .payment-container {
                grid-template-columns: 1fr;
                padding: 0 20px;
            }
            .navbar {
                padding: 16px 20px;
                flex-direction: column;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="navbar">
        <div class="logo-area">
            <img src="logo.png" alt="BELG SERVICES" class="logo-img" onerror="this.src='https://placehold.co/50x50?text=BS'">
            <span class="logo-text">BELG SERVICES</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>

    <!-- Payment Section -->
    <div class="payment-container">
        <!-- Left Side: Payment Form -->
        <div class="payment-card">
            <h2>Secure Payment</h2>
            <div class="secure-badge">
                <i class="fas fa-lock"></i> 256-bit SSL Secure
            </div>
            <div class="card-icons">
                <i class="fab fa-cc-visa"></i>
                <i class="fab fa-cc-mastercard"></i>
                <i class="fab fa-cc-amex"></i>
                <i class="fab fa-cc-paypal"></i>
            </div>

            <form id="paymentForm">
                <div class="input-group">
                    <label>Cardholder Name</label>
                    <input type="text" placeholder="John Smith" required>
                </div>
                <div class="input-group">
                    <label>Card Number</label>
                    <input type="text" placeholder="1234 5678 9012 3456" maxlength="19" required>
                </div>
                <div class="row-2col">
                    <div class="input-group">
                        <label>Expiry Date (MM/YY)</label>
                        <input type="text" placeholder="MM/YY" required>
                    </div>
                    <div class="input-group">
                        <label>CVV</label>
                        <input type="password" placeholder="123" maxlength="4" required>
                    </div>
                </div>
                <button type="submit" class="pay-btn"><i class="fas fa-shield-alt"></i> Pay Securely</button>
            </form>
        </div>

        <!-- Right Side: Order Summary -->
        <div class="summary-card">
            <h3>Order Summary</h3>
            <div class="summary-item">
                <span>Service Fee</span>
                <span>$120.00</span>
            </div>
            <div class="summary-item">
                <span>VAT (21%)</span>
                <span>$25.20</span>
            </div>
            <div class="summary-item">
                <span>Platform Fee</span>
                <span>$5.00</span>
            </div>
            <div class="summary-total">
                <span>Total Amount</span>
                <span>$150.20</span>
            </div>
            <div class="payment-methods">
                <p><i class="fas fa-check-circle"></i> Money-back guarantee</p>
                <p><i class="fas fa-headset"></i> 24/7 customer support</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2025 BELG SERVICES — Secure Payment Gateway</p>
    </div>

    <script>
        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("✅ Payment processed successfully! (Demo mode)\nThank you for trusting BELG SERVICES.");
            // In real scenario: redirect to success page
            // window.location.href = "payment-success.html";
        });
    </script>
</body>
  </html>
