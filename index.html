<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELG SERVICES</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fb;
}

/* Header */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: white;
}

.logo-text {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-text img {
    height: 40px;
}

.logo-text span {
    font-weight: bold;
    font-size: 18px;
}

/* Hero */
.hero {
    height: 85vh;
    background: linear-gradient(rgba(0,90,200,0.5), rgba(0,90,200,0.5)),
                url('hero.jpg') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
}

.hero h1 {
    font-size: 45px;
}

.search-box {
    background: white;
    margin-top: 20px;
    padding: 10px;
    border-radius: 8px;
    display: flex;
}

.search-box input {
    border: none;
    padding: 10px;
    outline: none;
}

.search-box button {
    background: #0066ff;
    color: white;
    border: none;
    padding: 10px 20px;
}

/* Services */
.services {
    text-align: center;
    padding: 50px;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 150px;
}

.card img {
    width: 60px;
}

/* Download */
.download {
    text-align: center;
    padding: 40px;
}

.download img {
    width: 140px;
}

/* Social */
.social {
    text-align: center;
}

.social img {
    width: 25px;
    margin: 10px;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    background: #eee;
}
</style>

</head>

<body>

<header>
    <div class="logo-text">
        <img src="logo.png">
        <span>BELG SERVICES</span>
    </div>
</header>

<section class="hero">
    <h1>BELG SERVICES</h1>
    <p>All services in one place</p>

    <div class="search-box">
        <input type="text" placeholder="What are you looking for?">
        <button>Search</button>
    </div>
</section>

<section class="services">
    <h2>Our Services</h2>

    <div class="cards">
        <div class="card">
            <img src="logo.png">
            <p>Service 1</p>
        </div>

        <div class="card">
            <img src="logo.png">
            <p>Service 2</p>
        </div>

        <div class="card">
            <img src="logo.png">
            <p>Service 3</p>
        </div>
    </div>
</section>

<section class="download">
    <img src="google.png">
    <img src="apple.png">
</section>

<div class="social">
    <img src="facebook.png">
    <img src="linkedin.png">
    <img src="x.png">
    <img src="whatsapp.png">
    <img src="youtube.png">
</div>

<footer>
    © 2026 BELG SERVICES
</footer>

</body>
</html>
