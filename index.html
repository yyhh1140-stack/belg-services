<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>خدمات بيجما</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* الخلفية */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url("bg.jpg");
      background-size: cover;
      background-position: center;
      z-index: -2;
      animation: bgZoom 12s ease-in-out infinite;
    }

    @keyframes bgZoom {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: -1;
    }

    /* الصفحة */
    .page {
      min-height: 100vh;
      padding: 30px 16px;
      text-align: center;
    }

    /* الكرة */
    .logo-ball {
      width: 240px;
      height: 240px;
      margin: 0 auto;
      opacity: 0;
      animation: ballDrop 1.8s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    @keyframes ballDrop {
      0% { opacity: 0; transform: translateY(-120px) scale(0.4); }
      60% { opacity: 1; transform: translateY(20px) scale(1.05); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-ball img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* العنوان */
    .title {
      font-size: 42px;
      font-weight: 900;
      margin-top: 10px;
      letter-spacing: 0.05em;
      animation: fadeUp 1.4s ease-out forwards;
      opacity: 0;
    }

    .subtitle {
      font-size: 17px;
      max-width: 420px;
      margin: 10px auto;
      opacity: 0;
      animation: fadeUp 1.4s ease-out 0.4s forwards;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* الأزرار */
    .main-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 25px;
    }

    .btn {
      padding: 14px 10px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
      opacity: 0;
      animation: fadeUp 1.4s ease-out 0.6s forwards;
    }

    .blue { background: linear-gradient(135deg, #2563eb, #38bdf8); }
    .green { background: linear-gradient(135deg, #16a34a, #4ade80); }
    .orange { background: linear-gradient(135deg, #ea580c, #f97316); }
    .red { background: linear-gradient(135deg, #b91c1c, #f97373); }

    /* المتاجر */
    .stores {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 40px;
    }

    .store-icon {
      width: 90px;
      height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 0 6px rgba(0,0,0,0.5));
      transition: transform 0.25s ease;
    }

    .store-icon:hover {
      transform: scale(1.12);
    }

    /* تابعنا */
    .social {
      margin-top: 60px;
    }

    .social-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .social-icons img {
      width: 38px;
      height: 38px;
      margin: 0 10px;
      filter: drop-shadow(0 0 4px rgba(0,0,0,0.4));
      transition: transform 0.25s ease;
    }

    .social-icons img:hover {
      transform: scale(1.15);
    }

    /* الفوتر */
    .footer {
      margin-top: 40px;
      padding: 20px 0;
      font-size: 14px;
      opacity: 0.85;
    }

  </style>
</head>

<body>

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="page">

    <!-- الكرة -->
    <div class="logo-ball">
      <img src="logo.png">
    </div>

    <!-- العنوان -->
    <div class="title">خدمات بيجما</div>

    <div class="subtitle">
      منصة ذكية عند الطلب تربط العملاء والشركات والعاملين في تجربة موحدة.
    </div>

    <!-- الأزرار -->
    <div class="main-buttons">
      <div class="btn blue">عميل</div>
      <div class="btn green">شركات</div>
      <div class="btn orange">العمال</div>
      <div class="btn red">تسجيل الدخول</div>
    </div>

    <!-- المتاجر -->
    <div class="stores">
      <img src="apple.png" class="store-icon">
      <img src="google.png" class="store-icon">
    </div>

    <!-- تابعنا -->
    <div class="social">
      <div class="social-title">تابعنا</div>
      <div class="social-icons">
        <img src="facebook.png">
        <img src="instagram.png">
        <img src="tiktok.png">
        <img src="whatsapp.png">
        <img src="linkedin.png">
      </div>
    </div>

    <!-- الفوتر -->
    <div class="footer">
      © 2026 شركة BelG للخدمات – جميع الحقوق محفوظة
    </div>

  </div>

</body>
</html>
