<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELG SERVICES — Home</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  text-align: center;
}

/* NAV */
.top-nav {
  background: #003366;
  padding: 12px 0;
  text-align: center;
}

.top-nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
}

/* LOGO */
.logo-container {
  margin-top: 20px;
}

.logo-container img {
  width: 160px;
}

/* COMPANY SLIDER */
.company-slider {
  width: 100%;
  overflow: hidden;
  margin: 20px 0;
}

.slider-track {
  display: flex;
  gap: 20px;
  padding: 10px;
  animation: scroll 18s linear infinite;
}

.company-card {
  min-width: 160px;
  background: white;
  padding: 10px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.company-card img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 8px;
}

.company-card p {
  margin-top: 8px;
  font-weight: bold;
  color: #003366;
  font-size: 14px;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* START BUTTON */
.start-button {
  margin-top: 20px;
}

.start-button a {
  display: inline-block;
  padding: 14px 28px;
  background: #003366;
  color: white;
  text-decoration: none;
  font-size: 18px;
  border-radius: 10px;
  font-weight: bold;
}

.start-button a:hover {
  background: #002244;
}

</style>
</head>

<body>

<!-- NAV -->
<nav class="top-nav">
  <a href="index.html">Home</a>
  <a href="client.html">Find Worker</a>
  <a href="company-profile.html">Companies</a>
  <a href="worker-profile.html">Workers</a>
  <a href="payment.html">Payment</a>
  <a href="my-bookings.html">My Bookings</a>
  <a href="notifications.html">Notifications</a>
</nav>

<!-- LOGO -->
<div class="logo-container">
  <img src="logo.png" alt="BELG SERVICES">
</div>

<!-- COMPANY ADS SLIDER -->
<div class="company-slider">
  <div class="slider-track">

    <div class="company-card">
      <img src="https://i.imgur.com/clean1.jpg">
      <p>CleanPro Services</p>
    </div>

    <div class="company-card">
      <img src="https://i.imgur.com/clean2.jpg">
      <p>MoveFast Belgium</p>
    </div>

    <div class="company-card">
      <img src="https://i.imgur.com/clean3.jpg">
      <p>FixIt Group</p>
    </div>

    <div class="company-card">
      <img src="https://i.imgur.com/clean4.jpg">
      <p>PaintMaster</p>
    </div>

  </div>
</div>

<!-- START BUTTON -->
<div class="start-button">
  <a href="client.html">Start Now</a>
</div>

</body>
</html>
