<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BelG Services</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* ===== BACKGROUND ===== */
    .hero-bg {
      position: fixed;
      inset: 0;
      background-image: url("bg.jpg");
      background-size: cover;
      background-position: center;
      z-index: -2;
      animation: bgBreath 10s ease-in-out infinite;
    }

    @keyframes bgBreath {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .hero-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: -1;
    }

    /* ===== PAGE ===== */
    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 30px 16px;
    }

    .hero {
      width: 100%;
      max-width: 1100px;
      text-align: center;
    }

    /* ===== LOGO ===== */
    .logo-ball {
      width: 260px;
      height: 260px;
      margin: 0 auto;
      opacity: 0;
      animation: logoIn 1.8s ease-out forwards;
    }

    @keyframes logoIn {
      0% { opacity: 0; transform: scale(0.4) translateY(-60px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .logo-ball img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ===== TITLE ===== */
    .platform-name {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 0.12em;
      margin-top: 10px;
      animation: fadeUp 1.4s ease-out forwards;
      opacity: 0;
    }

    .platform-subtitle {
      font-size: 17px;
      opacity: 0;
      max-width: 420px;
      margin: 10px auto;
      animation: fadeUp 1.4s ease-out 0.4s forwards;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ===== MAIN BUTTONS ===== */
    .main-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .action-card {
      padding: 14px 10px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
      animation: fadeUp 1.4s ease-out 0.6s forwards;
      opacity: 0;
    }

    .action-blue { background: linear-gradient(135deg, #2563eb, #38bdf8); }
    .action-green { background: linear-gradient(135deg, #16a34a, #4ade80); }
    .action-orange { background: linear-gradient(135deg, #ea580c, #f97316); }
    .action-red { background: linear-gradient(135deg, #b91c1c, #f97373); }

    /* ===== STORE ICONS ===== */
    .store-icons {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 40px;
    }

    .store-icon {
      width: 70px;
      height: 70px;
      object-fit: contain;
      filter: drop-shadow(0 0 6px rgba(0,0,0,0.4));
      transition: transform 0.25s ease;
    }

    .store-icon:hover {
      transform: scale(1.12);
    }

    /* ===== SOCIAL MEDIA ===== */
    .social-section {
      margin-top: 60px;
      text-align: center;
    }

    .social-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .social-icons img {
      width: 38px;
      height: 38px;
      margin: 0 10px;
      filter: drop-shadow(0 0 4px rgba(0,0,0,0.4));
      transition: transform 0.25s ease;
    }

    .social-icons img:hover {
      transform: scale(1.15);
    }

    /* ===== FOOTER ===== */
    .footer {
      margin-top: 40px;
      padding: 20px 0;
      text-align: center;
      font-size: 14px;
      opacity: 0.8;
    }

  </style>
</head>

<body>

  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <div class="page">
    <div class="hero">

      <!-- LOGO -->
      <div class="logo-ball">
        <img src="logo.png">
      </div>

      <div class="platform-name">BelG Services</div>

      <div class="platform-subtitle">
        A smart on-demand platform connecting customers, companies, and workers in one unified experience.
      </div>

      <!-- MAIN BUTTONS -->
      <div class="main-actions">
        <div class="action-card action-blue">Customer</div>
        <div class="action-card action-green">Companies</div>
        <div class="action-card action-orange">Workers</div>
        <div class="action-card action-red">Login</div>
      </div>

      <!-- STORE ICONS -->
      <div class="store-icons">
        <img src="apple.png" class="store-icon">
        <img src="google.png" class="store-icon">
      </div>

      <!-- SOCIAL MEDIA -->
      <div class="social-section">
        <div class="social-title">Follow Us</div>

        <div class="social-icons">
          <img src="facebook.png">
          <img src="instagram.png">
          <img src="tiktok.png">
          <img src="whatsapp.png">
          <img src="linkedin.png">
        </div>
      </div>

      <!-- FOOTER -->
      <div class="footer">
        © 2026 BelG Services — All Rights Reserved
      </div>

    </div>
  </div>

</body>
</html>
