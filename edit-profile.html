<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile — BELG SERVICES</title>

    <style>

    /* ----------------------  FOOTER  ---------------------- */
    .footer {
      background: #003366;
      color: white;
      padding: 20px 10px;
      text-align: center;
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.9;
    }

    /* ----------------------  GENERAL  ---------------------- */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f7f7f7;
    }

    .logo {
      width: 160px;
      margin-top: 20px;
    }

    h1 {
      font-size: 32px;
      font-weight: bold;
      color: #003366;
      text-align: center;
    }

    /* ----------------------  NAVIGATION  ---------------------- */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #003366;
      padding: 12px 0;
      text-align: center;
      z-index: 999;
    }

    .top-nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
    }

    .top-nav a:hover {
      text-decoration: underline;
    }

    header {
      margin-top: 100px;
      text-align: center;
    }

    /* ----------------------  PROFILE FORM  ---------------------- */
    .profile-box {
      max-width: 600px;
      margin: 40px auto;
      padding: 25px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .profile-box label {
      font-size: 16px;
      font-weight: bold;
      color: #003366;
    }

    .profile-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0 20px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .btn-save {
      width: 100%;
      background: #f4c542;
      color: black;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-save:hover {
      background: #e0b235;
    }

    .back-link {
      text-align: center;
      margin-top: 15px;
    }

    .back-link a {
      color: #003366;
      text-decoration: none;
      font-weight: bold;
    }

    </style>
</head>

<body>

<!-- ----------------------  NAVIGATION  ---------------------- -->
<nav class="top-nav">
  <a href="dashboard.html">Dashboard</a>
  <a href="services.html">Services</a>
  <a href="contact.html">Support</a>
  <a href="login.html">Logout</a>
</nav>

<!-- ----------------------  HEADER  ---------------------- -->
<header>
    <img src="logo.png" alt="BELG SERVICES Logo" class="logo">
    <h1>Edit Profile</h1>
</header>

<!-- ----------------------  PROFILE FORM  ---------------------- -->
<div class="profile-box">

    <label>Full Name</label>
    <input type="text" placeholder="Enter your full name" required>

    <label>Email</label>
    <input type="email" placeholder="Enter your email" required>

    <label>Phone Number</label>
    <input type="text" placeholder="Enter your phone number">

    <label>Address</label>
    <input type="text" placeholder="Enter your address">

    <label>New Password (optional)</label>
    <input type="password" placeholder="Enter new password">

    <button class="btn-save">Save Changes</button>

    <div class="back-link">
        <p><a href="dashboard.html">Back to Dashboard</a></p>
    </div>

</div>

<!-- ----------------------  FOOTER  ---------------------- -->
<footer class="footer">
  <p>© 2024 BELG SERVICES — All Rights Reserved</p>
  <p>Contact: info@belg-services.com</p>
</footer>

</body>
</html>
