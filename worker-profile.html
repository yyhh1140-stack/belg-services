<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Worker Profile - BELG SERVICES</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fefcf5;
            padding: 20px;
            color: #1e2a2f;
        }

        .profile-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        }

        /* Cover & Avatar */
        .cover-area {
            background: linear-gradient(135deg, #91D06C, #6aab3a);
            height: 140px;
            position: relative;
        }

        .avatar-wrapper {
            position: absolute;
            bottom: -50px;
            left: 30px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: #ddd;
            border-radius: 50%;
            border: 4px solid white;
            background-size: cover;
            background-position: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        /* Profile content */
        .profile-content {
            padding: 70px 28px 40px 28px;
        }

        .name-section {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .worker-name {
            font-size: 2rem;
            font-weight: 800;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 50px;
        }

        .status-available { background: #d4f5d0; color: #2e6b1f; }
        .status-busy { background: #ffe0b3; color: #b45f06; }
        .status-offline { background: #ffe0e0; color: #b33; }

        .worker-location {
            color: #6e5e4a;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 1rem;
        }

        .stars {
            color: #f5b042;
            letter-spacing: 2px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 28px 0 16px 0;
            border-left: 5px solid #91D06C;
            padding-left: 14px;
        }

        .services-list {
            background: #faf7f2;
            border-radius: 28px;
            padding: 8px 0;
        }

        .service-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid #e9dfd3;
        }

        .service-name i {
            color: #91D06C;
            width: 28px;
        }

        .service-price {
            font-weight: 700;
            color: #2c3e2f;
        }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0 10px;
        }

        .badge {
            background: #f0e9e1;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge i {
            margin-right: 6px;
            color: #91D06C;
        }

        .book-btn {
            background: #91D06C;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 60px;
            color: white;
            margin: 28px 0 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .book-btn:hover {
            background: #74aa4a;
            transform: scale(1.01);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #91D06C;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .profile-content { padding: 70px 20px 30px; }
            .worker-name { font-size: 1.6rem; }
            .avatar { width: 90px; height: 90px; }
        }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="cover-area"></div>
    <div class="avatar-wrapper">
        <div class="avatar" id="workerAvatar" style="background-image: url('https://randomuser.me/api/portraits/men/32.jpg');"></div>
    </div>

    <div class="profile-content">
        <a href="worker-dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Workers</a>

        <div class="name-section">
            <div class="worker-name" id="workerName">Mike R.</div>
            <div id="statusContainer"></div>
        </div>
        <div class="worker-location" id="workerLocation"><i class="fas fa-map-marker-alt"></i> United States · Speaks English, Spanish</div>

        <div class="rating" id="ratingArea">
            <span class="stars">★★★★★</span> 
            <span id="ratingValue">4.8 (103 reviews)</span>
        </div>

        <div class="section-title"><i class="fas fa-tools"></i> Services Offered</div>
        <div class="services-list" id="servicesList"></div>

        <div class="section-title"><i class="fas fa-check-circle"></i> Credentials</div>
        <div class="badge-group" id="badgesContainer"></div>

        <button class="book-btn" id="bookNowBtn"><i class="fas fa-calendar-check"></i> Book Now</button>
    </div>
</div>

<script>
    // Sample worker data (matches the one from dashboard)
    const worker = {
        id: 2,
        name: "Mike R.",
        age: 34,
        location: "United States",
        languages: "English, Spanish",
        rating: 4.8,
        reviews: 103,
        status: "available", // available, slow, offline
        avatar: "https://randomuser.me/api/portraits/men/2.jpg",
        services: [
            { name: "Furniture Moving", price: 40, icon: "fa-couch" },
            { name: "Loading / Unloading", price: 45, icon: "fa-boxes" },
            { name: "Truck & Van Rentals", price: 60, icon: "fa-truck" }
        ],
        badges: ["Licensed & Insured", "Background Checked", "Verified Professional", "Fast Response"]
    };

    function displayStatus(status) {
        if (status === "available") return '<span class="status-badge status-available"><i class="fas fa-circle"></i> Available Now</span>';
        if (status === "slow") return '<span class="status-badge status-busy"><i class="fas fa-circle"></i> Slow response</span>';
        return '<span class="status-badge status-offline"><i class="fas fa-circle"></i> Unavailable</span>';
    }

    document.getElementById("workerName").innerText = worker.name;
    document.getElementById("statusContainer").innerHTML = displayStatus(worker.status);
    document.getElementById("workerLocation").innerHTML = `<i class="fas fa-map-marker-alt"></i> ${worker.location} · Speaks ${worker.languages}`;
    document.getElementById("ratingValue").innerText = `${worker.rating} (${worker.reviews} reviews)`;
    document.getElementById("workerAvatar").style.backgroundImage = `url('${worker.avatar}')`;

    // Render services
    const servicesHtml = worker.services.map(s => `
        <div class="service-item">
            <span class="service-name"><i class="fas ${s.icon}"></i> ${s.name}</span>
            <span class="service-price">$${s.price}/hr</span>
        </div>
    `).join('');
    document.getElementById("servicesList").innerHTML = servicesHtml;

    // Render badges
    const badgesHtml = worker.badges.map(b => `<div class="badge"><i class="fas fa-shield-alt"></i> ${b}</div>`).join('');
    document.getElementById("badgesContainer").innerHTML = badgesHtml;

    // Book now button
    document.getElementById("bookNowBtn").addEventListener("click", () => {
        alert(`✅ Booking request sent to ${worker.name}. You will be notified shortly.`);
        // In real scenario: redirect to payment or booking page
        // window.location.href = "booking.html?workerId=" + worker.id;
    });
</script>

</body>
</html>
