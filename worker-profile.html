<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Worker Profile - BELG SERVICES</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f8ff;
            padding: 20px;
            color: #1e2a2f;
        }

        .profile-container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        }

        /* Cover Area - Light Blue */
        .cover-area {
            background: linear-gradient(135deg, #87CEEB, #A0D2EB);
            height: 140px;
            position: relative;
        }

        /* New text banner inside cover */
        .cover-text {
            text-align: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            padding-top: 20px;
            text-transform: uppercase;
        }
        .cover-text p {
            margin: 4px 0;
        }

        /* Avatar */
        .avatar-wrapper {
            position: absolute;
            bottom: -50px;
            left: 30px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: #ddd;
            border-radius: 50%;
            border: 4px solid white;
            background-size: cover;
            background-position: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        /* Profile content */
        .profile-content {
            padding: 70px 28px 40px 28px;
        }

        .name-section {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .worker-name {
            font-size: 2rem;
            font-weight: 800;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 50px;
        }

        .status-available { background: #d4f5d0; color: #2e6b1f; }

        .worker-location {
            color: #6e5e4a;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 1rem;
        }

        .stars {
            color: #f5b042;
            letter-spacing: 2px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 28px 0 16px 0;
            border-left: 5px solid #87CEEB;
            padding-left: 14px;
        }

        .services-list {
            background: #faf7f2;
            border-radius: 28px;
            padding: 8px 0;
        }

        .service-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid #e9dfd3;
        }

        .service-name i {
            color: #87CEEB;
            width: 28px;
        }

        .service-price {
            font-weight: 700;
            color: #2c3e2f;
        }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0 10px;
        }

        .badge {
            background: #f0e9e1;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge i {
            margin-right: 6px;
            color: #87CEEB;
        }

        /* Two new buttons (Portfolio / Upload) */
        .action-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 30px 0 20px;
        }
        .action-btn-small {
            flex: 1;
            text-align: center;
            background: #A0D2EB;
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            color: #1e2a2f;
        }
        .action-btn-small:hover {
            background: #87CEEB;
            transform: translateY(-2px);
        }

        /* Gallery Grid (6 images) */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
            margin: 20px 0 30px;
        }
        .gallery img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: 20px;
            transition: 0.2s;
            cursor: pointer;
            border: 2px solid #e0e7ff;
        }
        .gallery img:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* Book Now Button - Light Blue */
        .book-btn {
            background: #87CEEB;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 60px;
            color: #1e2a2f;
            margin: 20px 0 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .book-btn:hover {
            background: #6bb5d4;
            transform: scale(1.01);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #87CEEB;
            font-weight: 500;
        }

        @media (max-width: 680px) {
            .profile-content { padding: 70px 20px 30px; }
            .worker-name { font-size: 1.6rem; }
            .avatar { width: 90px; height: 90px; }
            .action-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="profile-container">
    <!-- Cover Area with new text -->
    <div class="cover-area">
        <div class="cover-text">
            <p>🚀 WE WORK FOR YOUR COMFORT</p>
            <p>❤️ WE ARE HAPPY TO SATISFY YOU</p>
        </div>
    </div>
    <div class="avatar-wrapper">
        <div class="avatar" id="workerAvatar" style="background-image: url('https://randomuser.me/api/portraits/men/32.jpg');"></div>
    </div>

    <div class="profile-content">
        <a href="worker-dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Workers</a>

        <div class="name-section">
            <div class="worker-name" id="workerName">Mike R.</div>
            <div id="statusContainer"><span class="status-badge status-available"><i class="fas fa-circle"></i> Available Now</span></div>
        </div>
        <div class="worker-location" id="workerLocation"><i class="fas fa-map-marker-alt"></i> United States · Speaks English, Spanish</div>

        <div class="rating" id="ratingArea">
            <span class="stars">★★★★☆</span> 
            <span id="ratingValue">4.8 (103 reviews)</span>
        </div>

        <!-- Two new buttons: Portfolio & Upload -->
        <div class="action-row">
            <button class="action-btn-small" id="portfolioBtn"><i class="fas fa-images"></i> Completed Work Photos</button>
            <button class="action-btn-small" id="uploadBtn"><i class="fas fa-upload"></i> Upload Photos</button>
        </div>

        <div class="section-title"><i class="fas fa-tools"></i> Services Offered</div>
        <div class="services-list" id="servicesList"></div>

        <div class="section-title"><i class="fas fa-check-circle"></i> Credentials</div>
        <div class="badge-group" id="badgesContainer"></div>

        <!-- Gallery Section (6 images) -->
        <div class="section-title"><i class="fas fa-camera"></i> Work Gallery</div>
        <div class="gallery" id="galleryContainer"></div>

        <button class="book-btn" id="bookNowBtn"><i class="fas fa-calendar-check"></i> Book Now</button>
    </div>
</div>

<script>
    // Worker data
    const worker = {
        name: "Mike R.",
        age: 34,
        location: "United States",
        languages: "English, Spanish",
        rating: 4.8,
        reviews: 103,
        status: "available",
        avatar: "https://randomuser.me/api/portraits/men/32.jpg",
        services: [
            { name: "Furniture Moving", price: 40, icon: "fa-couch" },
            { name: "Loading / Unloading", price: 45, icon: "fa-boxes" },
            { name: "Truck & Van Rentals", price: 60, icon: "fa-truck" }
        ],
        badges: ["Licensed & Insured", "Background Checked", "Verified Professional", "Fast Response"],
        gallery: [
            "https://picsum.photos/id/10/200/150",   // moving furniture
            "https://picsum.photos/id/20/200/150",   // electrician (tool)
            "https://picsum.photos/id/26/200/150",   // carrying items
            "https://picsum.photos/id/55/200/150",   // plumber
            "https://picsum.photos/id/96/200/150",   // painter
            "https://picsum.photos/id/58/200/150"    // driver
        ]
    };

    document.getElementById("workerName").innerText = worker.name;
    document.getElementById("workerLocation").innerHTML = `<i class="fas fa-map-marker-alt"></i> ${worker.location} · Speaks ${worker.languages}`;
    document.getElementById("ratingValue").innerText = `${worker.rating} (${worker.reviews} reviews)`;
    document.getElementById("workerAvatar").style.backgroundImage = `url('${worker.avatar}')`;

    // Render services
    const servicesHtml = worker.services.map(s => `
        <div class="service-item">
            <span class="service-name"><i class="fas ${s.icon}"></i> ${s.name}</span>
            <span class="service-price">$${s.price}/hr</span>
        </div>
    `).join('');
    document.getElementById("servicesList").innerHTML = servicesHtml;

    // Render badges
    const badgesHtml = worker.badges.map(b => `<div class="badge"><i class="fas fa-shield-alt"></i> ${b}</div>`).join('');
    document.getElementById("badgesContainer").innerHTML = badgesHtml;

    // Render gallery (6 images)
    const galleryHtml = worker.gallery.map(img => `<img src="${img}" alt="work sample" onclick="alert('Full image view coming soon')">`).join('');
    document.getElementById("galleryContainer").innerHTML = galleryHtml;

    // Buttons interactions
    document.getElementById("bookNowBtn").addEventListener("click", () => alert("✅ Booking request sent to Mike R."));
    document.getElementById("portfolioBtn").addEventListener("click", () => alert("📸 View completed work photos (full gallery coming soon)."));
    document.getElementById("uploadBtn").addEventListener("click", () => alert("📤 Upload your work photos feature will be available soon."));
</script>

</body>
</html>
